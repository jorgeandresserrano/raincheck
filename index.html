<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RainCheck Prototype</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <!-- Phosphor Icons for modern sleek icons -->
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
</head>
<body>
  <div class="app-container" id="app-container">
    
    <!-- Top Bar -->
    <header class="top-bar">
      <div class="location">
        <i class="ph ph-map-pin"></i>
        <span>San Francisco, CA</span>
      </div>
      <button class="settings-btn" aria-label="Settings">
        <i class="ph ph-sliders-horizontal"></i>
      </button>
    </header>

    <!-- Main Status Area -->
    <main class="status-hero">
      <div class="status-icon" id="status-icon">
        <i class="ph-fill ph-sun"></i>
      </div>
      <h1 class="status-title" id="status-title">Safe to wash</h1>
      <p class="status-subtitle" id="status-subtitle">Low precipitation risk for the next 24 hours.</p>
    </main>

    <!-- Controls Area -->
    <div class="controls-panel">
      <!-- Time Window Selection -->
      <div class="control-group">
        <label>Time Window</label>
        <div class="segmented-control" id="time-window">
          <button class="segment" data-val="6">6h</button>
          <button class="segment" data-val="12">12h</button>
          <button class="segment active" data-val="24">24h</button>
          <button class="segment" data-val="48">48h</button>
        </div>
      </div>

      <!-- Sensitivity Slider -->
      <div class="control-group slider-group">
        <div class="slider-header">
          <label>Rain Tolerance</label>
          <span id="tolerance-label" class="tolerance-label">Medium</span>
        </div>
        <input type="range" min="1" max="3" value="2" class="slider" id="tolerance-slider">
        <div class="slider-ticks">
          <span>Low</span>
          <span>Med</span>
          <span>High</span>
        </div>
      </div>

      <!-- Detail Card -->
      <div class="detail-card">
        <div class="detail-row">
          <div class="detail-item">
            <i class="ph ph-drop"></i>
            <span class="detail-val" id="pop-val">10%</span>
            <span class="detail-label">Precipitation</span>
          </div>
          <div class="detail-item">
            <i class="ph ph-cloud-rain"></i>
            <span class="detail-val" id="vol-val">0.0 mm</span>
            <span class="detail-label">Volume</span>
          </div>
          <div class="detail-item">
            <i class="ph ph-check-circle"></i>
            <span class="detail-val">High</span>
            <span class="detail-label">Confidence</span>
          </div>
        </div>
      </div>
    </div>
    
  </div>

  <script src="app.js"></script>
</body>
</html>
